# Render the Quarto book and publish to the gh-pages branch.
# Repository settings → Pages: deploy from branch "gh-pages", folder "/ (root)".
# https://quarto.org/docs/publishing/github-pages.html

name: Publish Quarto book

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches: 
      - main
      - master
  schedule:
    - cron: "0 17 * * 5"
# manually trigger the workflow
  workflow_dispatch:

name: Quarto Publish Book for best practices with Linux

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tinytex: true # required for pdf outputs

      - name: Render book
        run: quarto render

      - name: Publish to GitHub Pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          render: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
