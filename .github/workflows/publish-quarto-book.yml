# Render Quarto to ./docs then deploy as static files (no Jekyll build of ./docs).
#
# GitHub repo → Settings → Pages:
#   Build and deployment → Source: "GitHub Actions"
#
# Do NOT use "Deploy from a branch" → /docs unless you commit ./docs to git.
# Do NOT use the default "Jekyll" starter workflow (it expects ./docs in the checkout).

name: Quarto Publish Book for best practices with Linux

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 17 * * 5"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tinytex: true

      - name: Render book (HTML + PDF)
        run: quarto render

      - name: Publish to GitHub Pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          render: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
