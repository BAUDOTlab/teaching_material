# Quarto book project — only these sources are rendered (see project.render).
# https://quarto.org/docs/books/

project:
  type: book
  output-dir: docs
  render:
    - index.qmd
    - Linux/installation-linux.qmd

book:
  title: "Team teaching material"
  description: "Teaching resources (Linux installation guide and more)."
  # Stable PDF basename on the site (e.g. docs/team-teaching-material.pdf)
  output-file: team-teaching-material
  chapters:
    - index.qmd
    - Linux/installation-linux.qmd

format:
  html:
    theme: cosmo
    toc: true
  pdf:
    documentclass: scrbook
    pdf-engine: lualatex
    latex-auto-install: true
    monofont: "DejaVu Sans Mono"

# If running R scripts, must be run locally to avoid using too many GH actions.
execute:
  freeze: true
  echo: false
  eval: true
  message: false
  warning: false
  error: false